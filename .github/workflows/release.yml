name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            archive_ext: .tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            archive_ext: .zip
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            archive_ext: .tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ''
            archive_ext: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install MinGW (Windows)
        if: matrix.goos == 'windows'
        run: choco install mingw -y --no-progress

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ditto_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }} ./cmd/ditto/

      - name: Package
        shell: bash
        run: |
          if [ '${{ matrix.goos }}' = 'windows' ]; then
            7z a ditto_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_ext }} ditto_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          else
            tar czf ditto_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_ext }} ditto_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ditto_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ditto_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
